<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!--    <link rel="stylesheet" href="css/events.css">-->
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">Event Booking</span>

    <div>
        <button class="btn btn-outline-light btn-sm" onclick="logout()">Logout</button>
    </div>

    <button class="btn btn-outline-light btn-sm"
       onclick="window.location.href='my-bookings.html'">
        My Bookings
    </button>
</nav>

<div class="d-flex gap-3 mb-4">

    <!-- SEARCH (optional for later) -->
    <input type="text" id="searchInput" class="form-control w-25"
        placeholder="Search event...">

    <!-- CATEGORY DROPDOWN -->
    <select id="categoryFilter" class="form-select w-25">
        <option value="">All Categories</option>
    </select>

</div>

<!-- CONTENT -->
<div class="container mt-4">
    <h3 class="mb-4">Available Events</h3>

    <div class="row" id="eventsContainer">
        <!-- Events will load here -->
    </div>
</div>

<script src="js/events.js"></script>

</body>
</html>
