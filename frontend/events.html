<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events</title>

    <!-- Bootstrap & Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <!-- Project Stylesheets -->
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/events.css">
</head>

<body class="min-vh-100">

    <!-- Application Header -->
    <section class="top-header">

    <div class="brand-area">
        <img
            src="images/logos/logo.png" alt="Eventora" class="eventora-logo">
        <div>
            <h3 class="app-name">EVENTORA</h3>
            <p class="app-tagline">Discover. Book. Enjoy.</p>
        </div>
    </div>

    <div class="header-actions">

        <!-- Event Search -->
        <div class="search-box">
            <i class="bi bi-search"></i>

            <input type="text" id="searchInput" placeholder="Search events, artists, venues...">
        </div>

        <!-- Notifications -->
        <button class="icon-btn" onclick="window.location.href='notifications.html'">
            <i class="bi bi-bell"></i>
        </button>

        <!-- User Profile -->
        <button class="icon-btn">
            <i class="bi bi-person-circle"></i>
        </button>

    </div>

</section>

    <!-- Dashboard Layout -->
    <div class="dashboard-layout">

        <!-- Sidebar Navigation -->
        <aside class="sidebar">

            <div class="sidebar-menu">

                <a href="events.html" class="sidebar-link active">
                    <i class="bi bi-calendar-event"></i>
                    <span>Events</span>
                </a>

                <a href="my-bookings.html" class="sidebar-link">
                    <i class="bi bi-ticket-perforated"></i>
                    <span>My Bookings</span>
                </a>

                <a href="#" class="sidebar-link">
                    <i class="bi bi-heart"></i>
                    <span>Wishlist</span>
                </a>

                <a href="admin.html" id="adminLink" class="sidebar-link" style="display:none;">
                    <i class="bi bi-shield-lock"></i>
                    <span>Admin</span>
                </a>

                <a href="profile.html" class="sidebar-link">
                    <i class="bi bi-person"></i>
                    <span>Profile</span>
                </a>

            </div>

        </aside>

        <!-- Main Content -->
        <main class="content-area flex-grow-1">

            <!-- Hero Section -->
            <section class="hero-section">

                <div class="hero-content">

                    <h1>Find Amazing Events Near You</h1>

                    <p>
                        Explore music, sports, technology, festivals and more.
                    </p>

                    <button class="btn btn-primary explore-btn">
                        Explore Events
                    </button>
                </div>
            </section>

            <!-- Event Categories -->
            <section class="category-section px-4">

                <div class="category-grid">

                    <button class="category-card" data-category="Music">
                        <i class="bi bi-music-note-beamed"></i>
                        <span>Music</span>
                    </button>

                    <button class="category-card" data-category="Sports">
                        <i class="bi bi-trophy"></i>
                        <span>Sports</span>
                    </button>

                    <button class="category-card" data-category="Technology">
                        <i class="bi bi-cpu"></i>
                        <span>Technology</span>
                    </button>

                    <button class="category-card" data-category="Business">
                        <i class="bi bi-briefcase"></i>
                        <span>Business</span>
                    </button>

                    <button class="category-card" data-category="Education">
                        <i class="bi bi-mortarboard"></i>
                        <span>Education</span>
                    </button>

                    <button class="category-card" data-category="Health">
                        <i class="bi bi-heart-pulse"></i>
                        <span>Health</span>
                    </button>

                    <button class="category-card" data-category="Comedy">
                        <i class="bi bi-emoji-laughing"></i>
                        <span>Comedy</span>
                    </button>

                    <button class="category-card" data-category="Festivals">
                        <i class="bi bi-stars"></i>
                        <span>Festivals</span>
                    </button>
                </div>
            </section>

            <!-- Events Listing Header -->
            <div class="container-fluid px-4 pt-2">

                <div class="events-header">
                    <h2>Available Events</h2>
                    <p>Browse upcoming experiences</p>
                </div>

                <!-- Hidden Filter Control For JavaScript -->
                <select id="categoryFilter" class="form-select custom-dropdown d-none">
                    <option value="">All Categories</option>
                </select>
            </div>

            <!-- Events Grid -->
            <div class="flex-grow-1 px-4 pb-2">

            <div id="eventsContainer"
                 class="row row-cols-1 row-cols-sm-2 row-cols-md-5 g-3">
            </div>

            <!-- Pagination -->
            <nav class="mt-3 mb-2">
                <ul class="pagination justify-content-center" id="pagination"></ul>
            </nav>
            </div>
        </main>
    </div>

    <!-- Footer -->
    <div id="footer-placeholder"></div>

    <!-- Project Scripts -->
    <script src="js/footer.js"></script>
    <script src="js/events.js"></script>

    <!-- Bootstrap JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
