
<!-- events.html -->
<!-- ONLY required fixes applied -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/events.css">
    <link rel="stylesheet" href="css/navbar.css">
</head>

<body class="d-flex flex-column" style="height:100vh; overflow:hidden;">

    <!-- Navbar Inject Here -->
    <div id="navbar-container"></div>

    <!-- Main Page -->
    <main class="flex-grow-1 d-flex flex-column overflow-hidden">

        <div class="container-fluid px-4 mt-4">
            <div class="d-flex justify-content-between align-items-center mb-4">

                <h3 class="mb-0">Available Events</h3>

                <div style="min-width:200px;">
                    <select id="categoryFilter" class="form-select custom-dropdown">
                        <option value="">All Categories</option>
                    </select>
                </div>

            </div>
        </div>

        <div class="flex-grow-1 overflow-auto px-4 pb-5">

            <div id="eventsContainer"
                 class="row row-cols-1 row-cols-sm-2 row-cols-md-5 g-3">
            </div>

            <nav class="mt-5">
                <ul class="pagination justify-content-center" id="pagination"></ul>
            </nav>

        </div>

    </main>

    <!-- IMPORTANT ORDER -->
    <script src="js/events.js"></script>
    <script src="js/navbar.js"></script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
