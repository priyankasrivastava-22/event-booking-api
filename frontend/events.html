<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- <link rel="stylesheet" href="css/events.css"> -->
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-dark px-4">
    <span class="navbar-brand">Event Booking</span>

    <!-- RIGHT SIDE ACTIONS -->
    <div class="d-flex gap-2 align-items-center">

        <button class="btn btn-outline-light btn-sm" onclick="logout()">
            Logout
        </button>

        <button class="btn btn-outline-light btn-sm" onclick="window.location.href='my-bookings.html'">
            My Bookings
        </button>

        <button class="btn btn-outline-light btn-sm" onclick="window.location.href='notifications.html'">
            Notifications
            <span id="notifCount" class="badge bg-danger ms-1">0</span>
        </button>

        <button class="btn btn-outline-light btn-sm ms-2" onclick="window.location.href='profile.html'">
            Profile
        </button>

    </div>
</nav>

<!-- FILTER BAR -->
<div class="container mt-4">
    <div class="d-flex gap-3 mb-4">

        <!-- SEARCH -->
        <input type="text" id="searchInput" class="form-control w-25"
            placeholder="Search event...">

        <!-- CATEGORY -->
        <select id="categoryFilter" class="form-select w-25">
            <option value="">All Categories</option>
        </select>

    </div>
</div>

<!-- CONTENT -->
<div class="container">
    <h3 class="mb-4">Available Events</h3>

    <div class="row" id="eventsContainer">
        <!-- Events will load here -->
    </div>
</div>

<script src="js/events.js"></script>

</body>
</html>
