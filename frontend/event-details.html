<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<!--    <link rel="stylesheet" href="css/event-details.css">-->
    <link rel="stylesheet" href="css/common.css">
</head>
<body>

<div class="container mt-5">

    <!-- BACK BUTTON -->
    <button class="btn btn-secondary mb-3" onclick="goBack()">← Back</button>

    <div class="card p-4">

        <!-- TITLE -->
        <h2 id="title"></h2>
        <p id="description"></p>

        <hr>

        <!-- DETAILS -->
        <p><b>Location:</b> <span id="location"></span></p>
        <p><b>Date & Time:</b> <span id="date"></span></p>
        <p><b>Price:</b> ₹<span id="price"></span></p>
        <p><b>Available Seats:</b> <span id="seats"></span></p>

        <hr>

        <!-- TICKET SELECTOR -->
        <div class="d-flex align-items-center gap-3">
            <label>Tickets:</label>
            <input type="number" id="quantity" value="1" min="1" class="form-control w-25">
        </div>

        <!-- TOTAL -->
        <h4 class="mt-3">Total: ₹<span id="total">0</span></h4>

        <!-- BUTTON -->
        <button class="btn btn-primary mt-3" onclick="bookEvent()">
            Book Now
        </button>

        <!-- MESSAGE -->
        <p id="message" class="mt-3"></p>

    </div>

</div>

<script src="js/event-details.js"></script>

</body>
</html>
