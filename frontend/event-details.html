<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="css/footer.css">
<!--    <link rel="stylesheet" href="css/common.css">-->
    <link rel="stylesheet" href="css/event-details.css">
</head>
<body>

<div class="event-wrapper">

    <!-- TOP ACTION BAR -->
    <div class="top-bar">

        <button class="action-btn back-btn" onclick="goBack()">
            <i class="bi bi-chevron-left"></i>
            Back to Events
        </button>

        <div class="top-actions">

            <button class="action-btn icon-btn" onclick="toggleFavourite()">
                <i id="favIcon" class="bi bi-heart"></i>
            </button>

            <button class="action-btn icon-btn" onclick="shareEvent()">
                <i class="bi bi-share"></i>
            </button>

<!--            <button class="action-btn book-top-btn"-->
<!--                    onclick="document.getElementById('quantity').focus()">-->
<!--                Book Now-->
<!--            </button>-->

        </div>

    </div>

    <!-- MAIN GRID -->
    <div class="event-grid">

        <!-- LEFT SECTION -->
        <div class="left-panel">

            <!-- HERO IMAGE -->
            <div class="hero-card">

                <div class="category-badge">
                    <i class="bi bi-lightning-charge-fill"></i>
                    <span id="categoryText">Event</span>
                </div>

                <img id="eventImage" class="event-image" alt="Event">

                <div class="image-overlay"></div>

            </div>

            <!-- EVENT CONTENT -->
            <div class="content-card">

                <div class="title-row">

                    <h1 id="title"></h1>

                    <div class="verified-badge">
                        <i class="bi bi-patch-check-fill"></i>
                    </div>

                </div>

                <div class="subtitle">
                    Premium Event Experience
                </div>

                <div class="tag-wrapper">

                    <span class="event-tag" id="categoryTag">
                        Event
                    </span>

                </div>

                <div class="description-block">

                    <h4>About Event</h4>

                    <p id="description"></p>

                </div>

                <!-- DATE / VENUE -->
                <div class="meta-row">

                    <div class="meta-card">

                        <div class="meta-icon">
                            <i class="bi bi-calendar-event"></i>
                        </div>

                        <div>
                            <span class="meta-label">Date & Time</span>
                            <span class="meta-value" id="date"></span>
                        </div>

                    </div>

                    <div class="meta-card">

                        <div class="meta-icon">
                            <i class="bi bi-geo-alt"></i>
                        </div>

                        <div>
                            <span class="meta-label">Location</span>
                            <span class="meta-value" id="location"></span>
                        </div>

                    </div>

                </div>

            </div>

        </div>

        <!-- RIGHT SECTION -->
        <div class="right-panel">

            <!-- PRICE CARD -->
            <div class="card price-card">

                <div>

                    <span class="small-title">
                        Starting From
                    </span>

                    <div class="price-value">
                        ₹<span id="price"></span><span class="price-unit">/ticket</span>
                    </div>

                </div>

                <button class="hero-book-btn"
                        onclick="document.getElementById('quantity').focus()">
                    Book Now
                </button>

            </div>

            <!-- STATS CARD -->
<div class="card stats-card">

    <div class="stat-box">
        <i class="bi bi-grid"></i>
        <div class="stat-text">
            <span class="stat-value" id="categoryStat">Sports</span>
            <span class="stat-title">Category</span>
        </div>
    </div>

    <div class="stat-box">
        <i class="bi bi-people"></i>
        <div class="stat-text">
            <span class="stat-value" id="seats">799</span>
            <span class="stat-title">Seats</span>
        </div>
    </div>

    <div class="stat-box">
        <i class="bi bi-ticket-perforated"></i>
        <div class="stat-text">
            <span class="stat-value">Available</span>
            <span class="stat-title">Tickets</span>
        </div>
    </div>

</div>

            <!-- TICKETS + SUMMARY -->
<div class="bottom-row">

    <!-- BOOKING CARD -->
    <div class="card booking-card">
        <h4>Select Tickets</h4>
        <div class="ticket-row">
            <label>Quantity</label>
            <input type="number" id="quantity" min="1" value="1">
        </div>
    </div>

    <!-- SUMMARY -->
    <div class="card summary-card">
        <h4>Booking Summary</h4>
        <div class="summary-row">
            <span>Tickets</span>
            <span id="ticketCount">1</span>
        </div>
        <div class="summary-row">
            <span>Price</span>
            <span>₹<span id="priceSummary"></span></span>
        </div>
        <div class="summary-divider"></div>
        <div class="summary-total">
            <span>Total</span>
            <span>₹<span id="total"></span></span>
        </div>
        <button class="book-btn" onclick="bookEvent()">Continue Booking</button>
        <p id="message"></p>
    </div>

</div>

        </div>

    </div>

</div>

<div id="footer-placeholder"></div>

<script src="js/footer.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/event-details.js"></script>

</body>
