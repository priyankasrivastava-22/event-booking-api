<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Details</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/event-details.css">
</head>
<body class="d-flex flex-column">
<nav class="navbar navbar-dark px-4 sticky-top">
    <span class="navbar-brand fw-bold">EVENT BOOKING</span>

    <div class="d-flex gap-3 align-items-center">
        <input type="text" id="searchInput" class="form-control form-control-sm border-0 bg-dark text-white" placeholder="Search events..." style="width: 200px; background: rgba(255,255,255,0.1) !important;">

            <!-- BACK BUTTON -->
        <button class="btn btn-secondary btn-sm" onclick="goBack()" style="border-radius: 8px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);">
            <i class="bi bi-arrow-left"></i>
        </button>

        <button class="btn btn-outline-light btn-sm position-relative" onclick="window.location.href='notifications.html'">
            <i class="bi bi-bell"></i>
            <span id="notifCount" class="badge rounded-pill bg-danger position-absolute top-0 start-100 translate-middle">0</span>
        </button>

        <div class="dropdown">
            <button class="btn btn-primary btn-sm dropdown-toggle d-flex align-items-center gap-2" type="button" id="profileDropdown" data-bs-toggle="dropdown">
                <i class="bi bi-person-circle"></i> Profile
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-lg p-3" style="min-width: 220px; background: rgba(20, 25, 40, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);">
                <li class="text-white small mb-1 opacity-75">LOGGED IN AS</li>
                <li class="text-white fw-bold mb-2" id="nav-username">Loading...</li>
                <li><hr class="dropdown-divider border-secondary"></li>
                <li><a class="dropdown-item text-white small" href="my-bookings.html">My Bookings</a></li>
                <li><a class="dropdown-item text-danger small mt-2" href="#" onclick="logout()">Logout</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-4 event-wrapper">



    <div class="event-grid">

        <!-- LEFT SIDE -->
        <div>
            <img id="eventImage" class="event-image">

            <div class="card mt-3">
                <h5>Description</h5>
                <p id="description"></p>
            </div>
        </div>

        <!-- RIGHT SIDE -->
        <div>

            <!-- TITLE -->
            <div class="card mb-3">
                <h2 id="title"></h2>
                <p class="text-muted">Event Details</p>
            </div>

            <!-- INFO -->
            <div class="card mb-3">

                <div class="info-box">
                    <span class="label">Location</span>
                    <span class="value" id="location"></span>
                </div>

                <div class="info-box">
                    <span class="label">Date & Time</span>
                    <span class="value" id="date"></span>
                </div>

                <div class="info-box">
                    <span class="label">Available Seats</span>
                    <span class="value" id="seats"></span>
                </div>

            </div>

            <!-- BOOKING -->
            <div class="card">

                <div class="price mb-2">₹<span id="price"></span></div>

                <label class="mb-1">Tickets</label>
                <input type="number" id="quantity" value="1" min="1">

                <h5 class="mt-3">Total: ₹<span id="total">0</span></h5>

                <button class="btn btn-primary mt-3" onclick="bookEvent()">
                    Book Now
                </button>

                <p id="message" class="mt-2"></p>

            </div>

        </div>

    </div>

</div>

<script src="js/event-details.js"></script>


</body>
</html>
