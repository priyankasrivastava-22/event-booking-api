<!-- My Bookings Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Character encoding -->
    <meta charset="UTF-8">

    <!-- Browser title -->
    <title>My Bookings</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

    <!-- Shared styles -->
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/common.css">
<!--    <link rel="stylesheet" href="css/navbar.css">-->
    <link rel="stylesheet" href="css/my-bookings.css">
</head>

<body class="d-flex flex-column">

<!-- Navbar loads here -->
<!--<div id="navbar-container"></div>-->

<!-- Scrollable page content -->
<main class="flex-grow-1 overflow-auto">

    <!-- Main container -->
    <div class="container mt-4">

        <!-- Page heading -->
        <div class="d-flex align-items-center gap-3 mb-4">

            <!-- Back button -->
            <button type="button" id="backBtn" class="booking-back-btn">
                <i class="bi bi-chevron-left"></i>
            </button>

            <!-- Title text -->
            <div>
                <h3 class="mb-1">Your Bookings</h3>
                <p class="text-muted mb-0">Manage your booked events here.</p>
            </div>

            <!-- Header Actions -->
<div class="header-actions mb-4">

    <!-- Search -->
    <div class="search-box">
        <i class="bi bi-search"></i>
        <input type="text"
               id="bookingSearchInput"
               placeholder="Search your bookings...">
    </div>

    <!-- Notifications -->
    <button class="icon-btn"
            onclick="window.location.href='notifications.html'">
        <i class="bi bi-bell"></i>
    </button>

    <!-- Wishlist -->
    <button class="icon-btn"
            onclick="window.location.href='wishlist.html'">
        <i class="bi bi-heart"></i>
    </button>

    <!-- Profile -->
    <button class="icon-btn"
            onclick="window.location.href='profile.html'">
        <i class="bi bi-person-circle"></i>
    </button>

</div>
        </div>

        <!-- Booking cards render here -->
        <div id="bookingsContainer" class="row"></div>

    </div>

</main>

<!-- Footer loads here -->
<div id="footer-placeholder"></div>
<script src="js/footer.js"></script>

<!-- Scripts -->
<script src="js/my-bookings.js"></script>
<!--<script src="js/navbar.js"></script>-->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
