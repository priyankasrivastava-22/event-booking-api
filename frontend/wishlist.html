<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Wishlist</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">

<!--    <link rel="stylesheet" href="css/footer.css">-->
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/wishlist.css">
</head>

<body>

<div class="container-fluid mt-4 px-4">

    <!-- Header -->
    <div class="wishlist-header">

        <button id="backBtn" class="booking-back-btn">
            <i class="bi bi-chevron-left"></i>
        </button>

        <div>
            <h3 class="mb-1">My Wishlist</h3>
            <p class="text-muted mb-0">
                Events saved for later
            </p>
        </div>

        <div class="header-actions">

            <div class="search-box">
                <i class="bi bi-search"></i>

                <input
                    type="text"
                    id="wishlistSearchInput"
                    placeholder="Search saved events..."
                >
            </div>

            <button
                class="icon-btn"
                onclick="window.location.href='notifications.html'">

                <i class="bi bi-bell"></i>
            </button>

            <button
                class="icon-btn"
                onclick="window.location.href='profile.html'">

                <i class="bi bi-person-circle"></i>
            </button>

        </div>

    </div>

    <!-- Wishlist Cards -->
    <div id="wishlistContainer"
     class="row row-cols-1 row-cols-sm-2 row-cols-md-5 g-3 mt-4"></div>

</div>

<div id="footer-placeholder"></div>

<!--<script src="js/footer.js"></script>-->
<script src="js/wishlist.js"></script>

</body>
</html>
