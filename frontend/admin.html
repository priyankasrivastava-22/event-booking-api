<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="css/common.css">
</head>

<body class="d-flex" style="height: 100vh; overflow: hidden; background-color: #0f172a;">

    <!-- SIDEBAR -->
    <nav class="d-flex flex-column flex-shrink-0 p-3 text-white bg-dark border-end border-secondary" style="width: 240px;">
        <a href="/" class="d-flex align-items-center mb-3 text-white text-decoration-none">
            <span class="fs-4 fw-bold">Admin Panel</span>
        </a>

        <hr>

        <ul class="nav nav-pills flex-column mb-auto gap-2">
            <li><a href="#" class="nav-link active admin-nav" data-section="stats">Dashboard</a></li>
            <li><a href="#" class="nav-link text-white admin-nav" data-section="users">Users</a></li>
            <li><a href="#" class="nav-link text-white admin-nav" data-section="events">Events</a></li>
            <li><a href="#" class="nav-link text-white admin-nav" data-section="bookings">Bookings</a></li>
        </ul>

        <hr>

        <button class="btn btn-outline-light btn-sm" onclick="window.location.href='events.html'">
            Exit Admin
        </button>
    </nav>

    <!-- MAIN AREA -->
    <div class="d-flex flex-column flex-grow-1 overflow-hidden">

        <header class="navbar navbar-dark bg-dark px-4 py-3 border-bottom border-secondary">
            <h5 id="section-title" class="mb-0 text-white">Dashboard Overview</h5>
            <div id="header-actions"></div>
        </header>

        <main class="flex-grow-1 d-flex flex-column overflow-hidden">

            <div class="container-fluid px-4 pt-4">
                <div class="d-flex justify-content-between align-items-center mb-3">

                    <h4 class="text-white fw-bold mb-0">Event Management</h4>

                    <div class="d-flex gap-2">

                        <div class="input-group input-group-sm" style="width: 250px;">
                            <span class="input-group-text bg-dark border-secondary text-muted">
                                <i class="bi bi-search"></i>
                            </span>
                            <input type="text" id="adminEventSearch"
                                   class="form-control bg-dark text-white border-secondary"
                                   placeholder="Search events...">
                        </div>

                        <!-- BUTTON (already existing, no change) -->
                        <button class="btn btn-primary btn-sm px-3" onclick="openCreateEventModal()">
                            + Add Event
                        </button>

                    </div>
                </div>
            </div>

            <!-- CONTENT -->
            <div class="flex-grow-1 overflow-auto px-4">
                <div class="card bg-dark border-secondary shadow">
                    <div id="admin-main-view" class="table-responsive"></div>
                </div>

                <div class="d-flex justify-content-between align-items-center mt-3 pb-4">
                    <span class="text-muted small">
                        Showing <span id="start-count">1</span> to
                        <span id="end-count">10</span> of
                        <span id="total-count">0</span> entries
                    </span>

                    <nav>
                        <ul class="pagination pagination-sm mb-0" id="admin-pagination"></ul>
                    </nav>
                </div>
            </div>

        </main>
    </div>

    <!-- ========================= -->
    <!-- FIX: CREATE EVENT MODAL -->
    <!-- ========================= -->
    <div id="createEventModal" class="modal fade" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content bg-dark text-white">

                <div class="modal-header">
                    <h5 class="modal-title">Create Event</h5>
                    <button type="button" class="btn-close btn-close-white"
                            onclick="document.getElementById('createEventModal').classList.remove('show')">
                    </button>
                </div>

                <div class="modal-body">

                    <input id="title" class="form-control mb-2" placeholder="Title">
                    <input id="description" class="form-control mb-2" placeholder="Description">
                    <input id="location" class="form-control mb-2" placeholder="Location">
                    <input id="price" class="form-control mb-2" placeholder="Price">
                    <input id="seats" class="form-control mb-2" placeholder="Seats">
                    <input id="date" class="form-control mb-2" type="datetime-local">

                    <select id="categorySelect" class="form-control mb-2"></select>

                </div>

                <div class="modal-footer">
                    <button class="btn btn-secondary"
                            onclick="document.getElementById('createEventModal').classList.remove('show')">
                        Close
                    </button>

                    <button class="btn btn-primary" onclick="createEvent()">
                        Create
                    </button>
                </div>

            </div>
        </div>
    </div>

    <script src="js/admin.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <!-- FIX FUNCTION (ONLY ADDITION) -->
    <script>
        function openCreateEventModal() {
            const modal = document.getElementById("createEventModal");
            if (modal) {
                modal.classList.add("show");
                modal.style.display = "block";
            }
        }
    </script>

   <!-- EDIT EVENT MODAL -->
<div class="modal fade" id="editEventModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark text-white">

            <div class="modal-header">
                <h5 class="modal-title">Edit Event</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>

            <div class="modal-body">

                <input id="edit_title" class="form-control mb-2" placeholder="Title">
                <input id="edit_location" class="form-control mb-2" placeholder="Location">
                <input id="edit_price" class="form-control mb-2" placeholder="Price">
                <input id="edit_seats" class="form-control mb-2" placeholder="Total Seats">
                <input id="edit_date" type="datetime-local" class="form-control mb-2">
                <textarea id="edit_description" class="form-control mb-2" placeholder="Description"></textarea>

            </div>

            <div class="modal-footer">
                <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button class="btn btn-primary" onclick="saveEditedEvent()">Save Changes</button>
            </div>

        </div>
    </div>
</div>

</body>
</html>
