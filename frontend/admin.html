<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Panel</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/common.css">

    <style>
        .card {
            background: rgba(255,255,255,0.08);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: none;
            color: white;
        }
    </style>
</head>
<body>

<div class="container mt-4">

    <h2 class="mb-4">Admin Panel</h2>

    <!-- CREATE CATEGORY -->
    <div class="card p-3 mb-4">
        <h5>Create Category</h5>
        <input id="categoryName" class="form-control mb-2" placeholder="Category name">
        <button class="btn btn-primary" onclick="createCategory()">Add Category</button>
    </div>

    <!-- CREATE EVENT -->
    <div class="card p-3 mb-4">
        <h5>Create Event</h5>

        <input id="title" class="form-control mb-2" placeholder="Title">
        <input id="description" class="form-control mb-2" placeholder="Description">
        <input id="location" class="form-control mb-2" placeholder="Location">
        <input id="price" type="number" class="form-control mb-2" placeholder="Price">
        <input id="seats" type="number" class="form-control mb-2" placeholder="Total Seats">

        <select id="categorySelect" class="form-control mb-2"></select>

        <input id="date" type="datetime-local" class="form-control mb-2">

        <button class="btn btn-success" onclick="createEvent()">Create Event</button>
    </div>

    <!-- SEND NOTIFICATION -->
    <div class="card p-3 mb-4">
        <h5>Send Notification</h5>

        <input id="message" class="form-control mb-2" placeholder="Message">
        <input id="username" class="form-control mb-2" placeholder="Username (leave empty for all)">

        <button class="btn btn-warning" onclick="sendNotification()">Send</button>
    </div>

</div>

<script src="js/admin.js"></script>

</body>
</html>
